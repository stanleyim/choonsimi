<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CHOONSIMI AI STOCK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0e1a;
  --bg2:#0f1424;
  --card:#131929;
  --border:#1e2d45;
  --accent:#00ff9d;
  --accent2:#00e5ff;
  --warn:#f59e0b;
  --danger:#ef4444;
  --text:#e2e8f0;
  --muted:#4a5568;
  --up:#00ff9d;
  --mid:#f59e0b;
  --down:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
}

/* SCANLINE OVERLAY */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,157,0.015) 2px,
    rgba(0,255,157,0.015) 4px
  );
  pointer-events:none;
  z-index:9999;
}

.container{
  max-width:480px;
  margin:0 auto;
  padding-bottom:80px;
}

/* HEADER */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:16px;
  position:sticky;
  top:0;
  z-index:100;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:3px;
  color:var(--accent);
  text-shadow:0 0 20px rgba(0,255,157,0.5);
}

.status-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

.sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--muted);
  margin-top:4px;
}

.updated{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--accent2);
  margin-top:2px;
}

/* TABS */
.tabs{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.tab{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  padding:4px 10px;
  border-radius:4px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all 0.2s;
}

.tab.active{
  border-color:var(--accent);
  color:var(--accent);
  background:rgba(0,255,157,0.08);
}

/* SKELETON */
.skeleton{
  background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  height:110px;
  margin:10px 12px;
  border-radius:12px;
}

@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* CARD */
.card{
  background:var(--card);
  margin:8px 12px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  animation:fadeIn 0.4s ease both;
}

.card:active{
  transform:scale(0.98);
}

.card:hover{
  border-color:var(--accent2);
  box-shadow:0 0 16px rgba(0,229,255,0.1);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* RANK BADGE */
.rank-badge{
  position:absolute;
  top:-1px;left:-1px;
  background:var(--accent);
  color:#0a0e1a;
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:1px;
  padding:2px 8px;
  border-radius:12px 0 8px 0;
}

.rank-badge.gold{background:var(--accent);}
.rank-badge.silver{background:var(--accent2);}
.rank-badge.bronze{background:var(--warn);}

/* CARD TOP */
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-top:14px;
}

.name-wrap{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.name{
  font-size:15px;
  font-weight:900;
  color:var(--text);
}

.ticker-code{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--accent2);
  letter-spacing:1px;
}

/* SIGNAL BADGE */
.signal{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  font-weight:700;
  padding:3px 8px;
  border-radius:4px;
  letter-spacing:1px;
}

.signal.strong{
  background:rgba(0,255,157,0.15);
  color:var(--accent);
  border:1px solid rgba(0,255,157,0.3);
}

.signal.buy{
  background:rgba(0,229,255,0.12);
  color:var(--accent2);
  border:1px solid rgba(0,229,255,0.3);
}

.signal.watch{
  background:rgba(245,158,11,0.12);
  color:var(--warn);
  border:1px solid rgba(245,158,11,0.3);
}

.signal.sell{
  background:rgba(239,68,68,0.12);
  color:var(--danger);
  border:1px solid rgba(239,68,68,0.3);
}

/* SCORE BAR */
.bar-wrap{margin-top:10px;}

.bar-label{
  display:flex;
  justify-content:space-between;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--muted);
  margin-bottom:4px;
}

.bar-label span:last-child{
  color:var(--accent);
  font-weight:700;
}

.bar{
  height:4px;
  background:rgba(255,255,255,0.06);
  border-radius:2px;
  overflow:hidden;
}

.fill{
  height:100%;
  border-radius:2px;
  transition:width 1s cubic-bezier(0.4,0,0.2,1);
}

.fill.up{background:linear-gradient(90deg,#00b36e,var(--accent));}
.fill.mid{background:linear-gradient(90deg,#d97706,var(--warn));}
.fill.down{background:linear-gradient(90deg,#b91c1c,var(--danger));}

/* METRICS ROW */
.metrics{
  display:flex;
  gap:5px;
  margin-top:8px;
}

.metric{
  flex:1;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:6px;
  padding:5px 4px;
  text-align:center;
}

.m-label{
  font-size:8px;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
}

.m-value{
  font-size:11px;
  font-weight:800;
  font-family:'JetBrains Mono',monospace;
  margin-top:1px;
}

.m-value.green{color:var(--accent);}
.m-value.blue{color:var(--accent2);}
.m-value.yellow{color:var(--warn);}
.m-value.red{color:var(--danger);}

/* STAR */
.star{
  font-size:16px;
  color:var(--muted);
  cursor:pointer;
  transition:all 0.2s;
  padding:2px 4px;
  flex-shrink:0;
}

.star.active{
  color:var(--warn);
  text-shadow:0 0 8px rgba(245,158,11,0.6);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:flex-end;
  z-index:1000;
  backdrop-filter:blur(4px);
}

.modal.open{display:flex;}

.box{
  width:100%;
  max-width:480px;
  background:var(--bg2);
  border-radius:20px 20px 0 0;
  border:1px solid var(--border);
  border-bottom:none;
  padding:20px;
  animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
}

@keyframes slideUp{
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}

.box-handle{
  width:40px;height:4px;
  background:var(--border);
  border-radius:2px;
  margin:0 auto 16px;
}

.modal-title{
  font-size:18px;
  font-weight:900;
}

.modal-code{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--accent2);
  margin-top:2px;
}

.big-score{
  font-family:'Bebas Neue',sans-serif;
  font-size:52px;
  color:var(--accent);
  text-shadow:0 0 30px rgba(0,255,157,0.4);
  line-height:1;
  margin:12px 0;
}

.big-score span{
  font-size:18px;
  color:var(--muted);
}

.modal-rows{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:12px;
}

.m-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  padding:8px 10px;
  background:rgba(255,255,255,0.03);
  border-radius:8px;
  border:1px solid var(--border);
}

.m-row .lbl{color:var(--muted);}
.m-row .val{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
}

.modal-note{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--muted);
  text-align:center;
  margin-top:16px;
  padding-top:12px;
  border-top:1px solid var(--border);
}

.close-btn{
  display:block;
  width:100%;
  margin-top:12px;
  padding:12px;
  background:rgba(0,255,157,0.08);
  border:1px solid rgba(0,255,157,0.2);
  border-radius:10px;
  color:var(--accent);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:2px;
  transition:all 0.2s;
}

.close-btn:active{background:rgba(0,255,157,0.15);}

/* ERROR */
.error-card{
  margin:20px 12px;
  padding:20px;
  background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.2);
  border-radius:12px;
  text-align:center;
}

.error-card p{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--danger);
  margin-top:8px;
}

/* SECTION TITLE */
.section-title{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  padding:6px 12px 2px;
}

/* REFRESH BTN */
.refresh-btn{
  display:flex;
  align-items:center;
  gap:4px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--muted);
  background:none;
  border:none;
  cursor:pointer;
  padding:4px 8px;
  border-radius:6px;
  transition:color 0.2s;
}
.refresh-btn:hover{color:var(--accent);}
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="header-top">
      <div class="title">CHOONSIMI</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="refresh-btn" onclick="loadData()">⟳ 새로고침</button>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </div>
    <div class="sub">KRX AI 투자 신호 · ENGINE v7.5 DART</div>
    <div class="updated" id="updatedAt">데이터 로딩중...</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('top10',this)">TOP 10</button>
      <button class="tab" onclick="switchTab('all',this)">전체 200</button>
      <button class="tab" onclick="switchTab('fav',this)">★ 관심</button>
    </div>
  </header>

  <div id="list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="box" id="box">
    <div class="box-handle"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────
// 한국 주요 종목 이름 매핑 (KRX 코드 기준)
// ─────────────────────────────────────
const NAMES = {
  "005930":"삼성전자","000660":"SK하이닉스","207940":"삼성바이오로직스",
  "005380":"현대차","000270":"기아","068270":"셀트리온","035420":"NAVER",
  "005490":"POSCO홀딩스","051910":"LG화학","006400":"삼성SDI",
  "035720":"카카오","028260":"삼성물산","012330":"현대모비스",
  "066570":"LG전자","055550":"신한지주","105560":"KB금융",
  "086790":"하나금융지주","138040":"메리츠금융지주","316140":"우리금융지주",
  "003550":"LG","034220":"LG디스플레이","018260":"삼성에스디에스",
  "032830":"삼성생명","030200":"KT","017670":"SK텔레콤",
  "096770":"SK이노베이션","010130":"고려아연","011200":"HMM",
  "000810":"삼성화재","009150":"삼성전기","047810":"한국항공우주",
  "003490":"대한항공","010950":"S-Oil","011790":"SKC",
  "042660":"한화오션","009830":"한화솔루션","000100":"유한양행",
  "128940":"한미약품","326030":"SK바이오팜","196170":"알테오젠",
  "091990":"셀트리온헬스케어","036570":"엔씨소프트","251270":"넷마블",
  "112040":"위메이드","263750":"펄어비스","259960":"크래프톤",
  "352820":"하이브","041510":"에스엠","035900":"JYP Ent.",
  "122870":"와이지엔터테인먼트","950130":"엑스페릭스","373220":"LG에너지솔루션",
  "247540":"에코프로비엠","086520":"에코프로","003670":"포스코퓨처엠",
  "000080":"하이트진로","271560":"오리온","097950":"CJ제일제당",
  "007070":"GS리테일","069960":"현대백화점","004170":"신세계",
  "139480":"이마트","078930":"GS","015760":"한국전력",
  "071050":"한국금융지주","029780":"삼성카드","004020":"현대제철",
  "010060":"OCI","011070":"LG이노텍","009540":"HD한국조선해양",
  "042700":"한미반도체","240810":"원익IPS","058470":"리노공업",
};

// ─────────────────────────────────────
// 상태
// ─────────────────────────────────────
let allData = [];
let selected = {};
let currentTab = 'top10';
let currentStock = null;

// ─────────────────────────────────────
// 점수 → 신호
// ─────────────────────────────────────
function getSignal(score, maxScore) {
  const pct = maxScore > 0 ? (score / maxScore) * 100 : 0;
  if (pct >= 80) return {label:'STRONG BUY', cls:'strong'};
  if (pct >= 60) return {label:'BUY', cls:'buy'};
  if (pct >= 40) return {label:'WATCH', cls:'watch'};
  return {label:'SELL', cls:'sell'};
}

function getBarClass(score, maxScore) {
  const pct = maxScore > 0 ? (score / maxScore) * 100 : 0;
  if (pct >= 60) return 'up';
  if (pct >= 40) return 'mid';
  return 'down';
}

function getRankBadge(idx) {
  if (idx === 0) return {text:'🥇 1위', cls:'gold'};
  if (idx === 1) return {text:'🥈 2위', cls:'silver'};
  if (idx === 2) return {text:'🥉 3위', cls:'bronze'};
  return {text:`# ${idx+1}`, cls:'normal'};
}

function getName(code, dataName) {
  return dataName || NAMES[code] || code;
}

// ─────────────────────────────────────
// 탭 전환
// ─────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ─────────────────────────────────────
// 관심 토글
// ─────────────────────────────────────
function toggleFav(code, e) {
  e.stopPropagation();
  selected[code] = !selected[code];
  try { localStorage.setItem('fav', JSON.stringify(selected)); } catch(e){}
  render();
}

// ─────────────────────────────────────
// 모달
// ─────────────────────────────────────
function openModal(code) {
  const s = allData.find(x => x.code === code);
  if (!s) return;
  currentStock = s;
  const maxScore = allData.length > 0 ? allData[0].score : 1;
  const pct = Math.round((s.score / maxScore) * 100);
  const sig = getSignal(s.score, maxScore);
  const name = s.name || NAMES[s.code] || s.code;
  const dartPct = Math.round((s.dart_score / 60) * 100);
  const estUp = (s.dart_score * 0.8 + (pct * 0.05)).toFixed(1);

  document.getElementById('box').innerHTML = `
    <div class="box-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="modal-title">${name}</div>
        <div class="modal-code">${s.code}</div>
      </div>
      <div class="signal ${sig.cls}">${sig.label}</div>
    </div>

    <div class="big-score">${pct}<span>/100</span></div>

    <div class="modal-rows">
      <div class="m-row">
        <span class="lbl">💰 현재가</span>
        <span class="val" style="color:var(--accent2)">${s.close.toLocaleString()}원</span>
      </div>
      <div class="m-row">
        <span class="lbl">🤖 AI 종합점수</span>
        <span class="val" style="color:var(--accent)">${s.score.toFixed(4)}</span>
      </div>
      <div class="m-row">
        <span class="lbl">📊 DART 재무점수</span>
        <span class="val" style="color:${dartPct >= 60 ? 'var(--accent)' : dartPct >= 30 ? 'var(--warn)' : 'var(--danger)'}">${s.dart_score.toFixed(2)} / 60</span>
      </div>
      <div class="m-row">
        <span class="lbl">📈 예상 상승여력</span>
        <span class="val" style="color:var(--accent)">+${estUp}%</span>
      </div>
      <div class="m-row">
        <span class="lbl">⚠️ 재무 리스크</span>
        <span class="val" style="color:${dartPct >= 50 ? 'var(--accent)' : 'var(--danger)'}">${dartPct >= 60 ? '낮음' : dartPct >= 30 ? '보통' : '높음'}</span>
      </div>
    </div>

    <div class="modal-note">※ AI 분석 참고용 · 투자 결정의 최종 책임은 본인에게 있습니다</div>

    <button class="close-btn" onclick="closeModal()">CLOSE</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ─────────────────────────────────────
// 렌더
// ─────────────────────────────────────
function render() {
  const listEl = document.getElementById('list');
  let displayData;

  if (currentTab === 'top10') {
    displayData = allData.slice(0, 10);
  } else if (currentTab === 'all') {
    displayData = allData;
  } else {
    displayData = allData.filter(s => selected[s.code]);
  }

  if (displayData.length === 0) {
    listEl.innerHTML = `
      <div class="error-card">
        <div style="font-size:24px;">★</div>
        <p>${currentTab === 'fav' ? '관심 종목이 없습니다' : '데이터 없음'}</p>
      </div>`;
    return;
  }

  const maxScore = allData.length > 0 ? allData[0].score : 1;

  listEl.innerHTML = '';

  if (currentTab === 'top10') {
    listEl.insertAdjacentHTML('beforeend', '<div class="section-title">▶ AI 추천 TOP 10</div>');
  } else if (currentTab === 'all') {
    listEl.insertAdjacentHTML('beforeend', `<div class="section-title">▶ 전체 ${allData.length}종목</div>`);
  }

  displayData.forEach((s, idx) => {
    const pct = Math.round((s.score / maxScore) * 100);
    const sig = getSignal(s.score, maxScore);
    const barCls = getBarClass(s.score, maxScore);
    const rank = getRankBadge(idx);
    const name = getName(s.code, s.name);
    const isFav = !!selected[s.code];
    const dartPct = Math.round((s.dart_score / 60) * 100);
    const delay = Math.min(idx * 0.05, 0.5);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${delay}s`;
    card.onclick = () => openModal(s.code);

    card.innerHTML = `
      <div class="rank-badge ${rank.cls}">${rank.text}</div>

      <div class="card-top">
        <div class="name-wrap">
          <div class="name">${name}</div>
          <div class="ticker-code">${s.code}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="signal ${sig.cls}">${sig.label}</div>
          <div class="star ${isFav ? 'active' : ''}"
               onclick="toggleFav('${s.code}', event)">★</div>
        </div>
      </div>

      <div class="bar-wrap">
        <div class="bar-label">
          <span>AI SCORE</span>
          <span>${pct}점</span>
        </div>
        <div class="bar">
          <div class="fill ${barCls}" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="m-label">현재가</div>
          <div class="m-value blue">${s.close >= 10000 ? (s.close/10000).toFixed(1)+'만' : s.close.toLocaleString()}</div>
        </div>
        <div class="metric">
          <div class="m-label">AI점수</div>
          <div class="m-value green">${s.score.toFixed(2)}</div>
        </div>
        <div class="metric">
          <div class="m-label">DART</div>
          <div class="m-value ${dartPct >= 60 ? 'green' : dartPct >= 30 ? 'yellow' : 'red'}">${s.dart_score.toFixed(1)}</div>
        </div>
        <div class="metric">
          <div class="m-label">상승여력</div>
          <div class="m-value green">+${(s.dart_score * 0.8 + pct * 0.05).toFixed(1)}%</div>
        </div>
      </div>
    `;

    listEl.appendChild(card);
  });
}

// ─────────────────────────────────────
// 데이터 로드
// ─────────────────────────────────────
async function loadData() {
  document.getElementById('list').innerHTML = `
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  `;
  document.getElementById('updatedAt').textContent = '로딩중...';

  try {
    // 로컬 개발 시 상대경로, GitHub Pages 배포 시도 동일하게 동작
    const res = await fetch('./data.json?v=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // 데이터 세팅
    allData = (json.all || json.top10 || []).sort((a,b) => b.score - a.score);

    // 업데이트 시각
    const date = new Date(json.time || json.generated_at);
    if (!isNaN(date)) {
      const m = date.getMonth()+1;
      const d = date.getDate();
      const h = date.getHours();
      const min = String(date.getMinutes()).padStart(2,'0');
      document.getElementById('updatedAt').textContent =
        `업데이트: ${m}월 ${d}일 ${h}:${min} · 기준일: ${json.data_date || '-'} · ${json.mode || ''}`;
    }

    // 관심 복원
    try {
      const saved = localStorage.getItem('fav');
      if (saved) selected = JSON.parse(saved);
    } catch(e) {}

    render();

  } catch(e) {
    console.error(e);
    document.getElementById('updatedAt').textContent = '로드 실패';
    document.getElementById('list').innerHTML = `
      <div class="error-card">
        <div style="font-size:32px;">⚠</div>
        <p>데이터를 불러오지 못했습니다</p>
        <p style="margin-top:6px;color:var(--muted);">${e.message}</p>
        <button onclick="loadData()" style="
          margin-top:12px;padding:8px 16px;
          background:rgba(239,68,68,0.1);
          border:1px solid rgba(239,68,68,0.3);
          border-radius:8px;color:var(--danger);
          font-family:'JetBrains Mono',monospace;
          font-size:11px;cursor:pointer;">
          RETRY
        </button>
      </div>`;
  }
}

loadData();
</script>

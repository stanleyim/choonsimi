<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CHOONSIMI">
<base href="/choonsimi/">
<title>CHOONSIMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0B1120;--bg2:#131B2E;--bg3:#1A2438;--bg4:#222E45;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#DDE3F0;--text2:#7A86A0;--text3:#3E4A60;
  --up:#E84040;--dn:#3D88FF;--accent:#3D88FF;
  --green:#2ECC8E;--green-bg:rgba(46,204,142,0.10);
  --gold:#F0A500;--gold-bg:rgba(240,165,0,0.10);
  --warn:#F5B731;--warn-bg:rgba(245,183,49,0.10);
  --up-bg:rgba(232,64,64,0.10);--dn-bg:rgba(61,136,255,0.10);
  --radius:13px;--radius-sm:9px;--radius-xs:6px;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:56px}
.wrap{max-width:480px;margin:0 auto;padding:0 14px}

/* ── 헤더 ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(11,17,32,.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;border-bottom:.5px solid var(--border);margin:0 -14px}
.h-left{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:#0B1120;flex-shrink:0}
.logo-text{line-height:1.1}

/* CHOONSIMI 멋진 글자 */
.logo-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:3px;
  background:linear-gradient(135deg,#FFE566 0%,#F0A500 50%,#FFD700 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 8px rgba(240,165,0,0.35));
  white-space:nowrap;
  line-height:1.1;
}
.logo-sub{font-size:8px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

.h-right{display:flex;align-items:center;gap:7px}
.date-pill{font-size:10px;color:var(--text2);background:var(--bg3);padding:4px 9px;border-radius:20px;border:.5px solid var(--border);font-family:var(--mono);white-space:nowrap}
.login-btn{display:flex;align-items:center;font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;cursor:pointer;background:var(--accent);color:#fff;border:none;white-space:nowrap;font-family:inherit;transition:opacity.2s}
.login-btn:hover{opacity:.85}
.user-chip{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);background:var(--bg3);border:.5px solid var(--border);padding:4px 10px;border-radius:20px;cursor:pointer;font-family:var(--mono);white-space:nowrap}
.u-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp.28s ease both}

/* ── 레짐 카드 ── */
.regime-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:.5px solid var(--border);border-radius:var(--radius);padding:13px;margin:12px 0 8px;position:relative;overflow:hidden}
.regime-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--regime-color,var(--accent)) 0%,transparent 80%)}
.regime-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.regime-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.3px}
.regime-badge.up{background:var(--green-bg);color:var(--green)}
.regime-badge.dn{background:var(--up-bg);color:var(--up)}
.regime-badge.side{background:var(--warn-bg);color:var(--warn)}
.signal-wrap{display:flex;align-items:flex-end;gap:3px;height:22px}
.sig-bar{border-radius:2px;background:var(--regime-color,var(--accent));flex-shrink:0}
.sig-bar.off{opacity:.13}
.sig-bar.b1{width:5px;height:4px}.sig-bar.b2{width:5px;height:6px}.sig-bar.b3{width:5px;height:8px}
.sig-bar.b4{width:5px;height:10px}.sig-bar.b5{width:5px;height:12px}.sig-bar.b6{width:5px;height:14px}
.sig-bar.b7{width:5px;height:16px}.sig-bar.b8{width:5px;height:18px}.sig-bar.b9{width:5px;height:20px}
.sig-bar.b10{width:5px;height:22px}
.conf-row{display:flex;align-items:center;gap:8px}
.conf-txt{font-size:10px;color:var(--text2)}

/* ── 통계 ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.stat-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.stat-label{font-size:9px;color:var(--text3);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.stat-val{font-size:16px;font-weight:700;font-family:var(--mono)}
.stat-val.up{color:var(--up)}.stat-val.dn{color:var(--dn)}

/* ── 섹션 라벨 ── */
.sec-label{display:flex;align-items:center;gap:7px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:7px 0 5px}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--border)}
.sec-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;border:.5px solid;letter-spacing:.4px}
.sec-badge.gold{color:var(--gold);border-color:rgba(240,165,0,.3);background:var(--gold-bg)}
.sec-badge.blue{color:var(--accent);border-color:rgba(61,136,255,.3);background:var(--dn-bg)}
.sec-badge.dim{color:var(--text3);border-color:var(--border);background:none}

/* ── 종목 카드 ── */
.stock-card{display:flex;align-items:center;gap:9px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;margin-bottom:4px;cursor:pointer;transition:transform.1s,background.15s,border-color.15s}
.stock-card:active{transform:scale(.98)}
.stock-card:hover{background:var(--bg3);border-color:var(--border2)}
.stock-card.t3{background:linear-gradient(135deg,rgba(240,165,0,.05) 0%,var(--bg2) 60%);border-color:rgba(240,165,0,.16)}
.stock-card.t10{border-color:rgba(61,136,255,.10)}
.rank-col{min-width:22px;display:flex;justify-content:center}
.rank-num{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text3)}
.rank-num.gold{color:var(--gold);font-size:15px}
.card-mid{flex:1;min-width:0}
.card-name-row{display:flex;align-items:baseline;gap:5px;white-space:nowrap;overflow:hidden}
.card-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis}
.card-name.bold{font-weight:700}
.card-code{font-size:9px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.score-row{display:flex;align-items:center;gap:4px;margin-top:3px}
.score-bar{flex:1;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.score-fill{height:100%;border-radius:1px;background:var(--accent)}
.score-fill.gold-bar{background:var(--gold)}.score-fill.dim{opacity:.28}
.score-num{font-size:9px;color:var(--text3);font-family:var(--mono);min-width:22px;text-align:right}
.card-right{text-align:right;flex-shrink:0}
.card-price{font-size:12px;font-weight:500;font-family:var(--mono);color:var(--text)}
.card-chg{font-size:11px;font-weight:700;font-family:var(--mono);margin-top:3px}
.card-chg.up{color:var(--up)}.card-chg.dn{color:var(--dn)}.card-chg.flat{color:var(--text3)}

.state-box{text-align:center;padding:56px 20px;color:var(--text2);font-size:13px}
.state-box i{font-size:28px;display:block;margin-bottom:10px;opacity:.4}
.update-bar{text-align:center;font-size:9px;color:var(--text3);padding:12px 0 4px;font-family:var(--mono)}

/* ════ 모달 배경 ════ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}
.modal-bg.open{display:flex}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="h-left">
      <img class="logo-img" src="data:image/svg+xml,%3Csvg xmlns=N/A width='36' height='36' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='8' fill='%230B1120'/%3E%3Cpath d='M10 24 L18 12 L26 24' stroke='%23F0A500' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='18' cy='16' r='1.5' fill='%23F0A500'/%3E%3C/svg%3E" alt="logo">
      <div class="logo-text">
        <div class="logo-main">CHOONSIMI</div>
        <div class="logo-sub">ENGINE v7.3</div>
      </div>
    </div>
    <div class="h-right">
      <div class="date-pill" id="date-pill">--/--</div>
      <div id="auth-area">
        <button class="login-btn" onclick="openLogin()">Login</button>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="state-box"><i class="ti ti-loader"></i>데이터 로딩중...</div>
  </div>

  <div class="update-bar" id="update-bar"></div>
</div>

<div class="modal-bg" id="loginModal">
  <!-- 로그인 모달 내용 생략 -->
</div>

<script>
/* ══════════
   더미 데이터
══════════ */
const DUMMY={
  "date":"","regime":"UPTREND","confidence":0.61,"score":0.622,
  "top20":[
    {"rank":1,"code":"319400","name":"현대무벡스","score":82.1,"price":37950,"change_pct":22.42,"flow_net":0},
    {"rank":2,"code":"001440","name":"대한전선","score":81.3,"price":72300,"change_pct":12.79,"flow_net":5.2},
    {"rank":3,"code":"086280","name":"현대글로비스","score":79.8,"price":195000,"change_pct":4.5,"flow_net":3.1},
    {"rank":4,"code":"007070","name":"GS리테일","score":77.2,"price":24500,"change_pct":3.2,"flow_net":1.5},
    {"rank":5,"code":"012330","name":"현대모비스","score":76.4,"price":285000,"change_pct":2.8,"flow_net":4.2},
    {"rank":6,"code":"066570","name":"LG전자","score":75.8,"price":91800,"change_pct":5.1,"flow_net":6.8},
    {"rank":7,"code":"005380","name":"현대차","score":75.3,"price":258000,"change_pct":3.7,"flow_net":5.5},
    {"rank":8,"code":"005930","name":"삼성전자","score":75.0,"price":268500,"change_pct":2.1,"flow_net":8.9,"roe":12.4},
    {"rank":9,"code":"064400","name":"LG씨엔에스","score":74.5,"price":52400,"change_pct":4.3,"flow_net":2.1},
    {"rank":10,"code":"012860","name":"모베이스전자","score":73.9,"price":4365,"change_pct":11.64,"flow_net":2.1},
    {"rank":11,"code":"000660","name":"SK하이닉스","score":70.1,"price":196500,"change_pct":3.9,"flow_net":7.2,"roe":18.5},
    {"rank":12,"code":"090710","name":"휴림로봇","score":68.4,"price":12790,"change_pct":6.58,"flow_net":3.1},
    {"rank":13,"code":"223250","name":"드림씨아이에스","score":66.2,"price":7120,"change_pct":13.92,"flow_net":0},
    {"rank":14,"code":"000270","name":"기아","score":64.8,"price":118500,"change_pct":2.4,"flow_net":4.8,"roe":22.1},
    {"rank":15,"code":"035420","name":"NAVER","score":63.2,"price":185000,"change_pct":-0.5,"flow_net":2.3},
    {"rank":16,"code":"078150","name":"HB테크놀러지","score":61.7,"price":4830,"change_pct":6.62,"flow_net":0},
    {"rank":17,"code":"035720","name":"카카오","score":60.3,"price":45200,"change_pct":-1.2,"flow_net":1.8},
    {"rank":18,"code":"003490","name":"대한항공","score":58.9,"price":26350,"change_pct":2.8,"flow_net":3.4},
    {"rank":19,"code":"086960","name":"MDS테크","score":57.4,"price":3160,"change_pct":13.26,"flow_net":0},
    {"rank":20,"code":"105560","name":"KB금융","score":55.8,"price":98900,"change_pct":1.6,"flow_net":5.1,"roe":9.8}
  ]
};

/* ══════════
   로컬 인증 (Supabase 없을 때 fallback)
══════════ */
const USERS_KEY = 'csm_users';
const SESSION_KEY = 'csm_session';

function localGetUsers(){
  try{ return JSON.parse(localStorage.getItem(USERS_KEY)||'{}'); }catch{ return {}; }
}
function localSaveUsers(u){ localStorage.setItem(USERS_KEY,JSON.stringify(u)); }

function localSignUp(email,pw){
  if(pw.length<6) return {error:'weak'};
  const users=localGetUsers();
  if(users[email]) return {error:'already'};
  users[email]={pw, createdAt:new Date().toISOString()};
  localSaveUsers(users);
  localStorage.setItem(SESSION_KEY,JSON.stringify({email}));
  return {ok:true};
}
function localSignIn(email,pw){
  const users=localGetUsers();
  if(!users[email]||users[email].pw!==pw) return {error:'invalid'};
  localStorage.setItem(SESSION_KEY,JSON.stringify({email}));
  return {ok:true};
}
function localSignOut(){
  localStorage.removeItem(SESSION_KEY);
}
function getSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch{ return null; }
}

/* ══════════
   렌더링 함수
══════════════════════════════════ */
function render(){
  const data = DUMMY; // 실제론 fetch('result.json') 사용
  const datePill = document.getElementById('date-pill');
  datePill.textContent = new Date().toLocaleDateString('ko-KR');

  const content = document.getElementById('content');
  let html = '';

  if(data.regime){
    const badgeClass = data.regime==='UPTREND'?'up':data.regime==='DOWNTREND'?'dn':'side';
    html += `<div class="regime-card"><div class="regime-top"><div class="regime-badge ${badgeClass}">${data.regime}</div></div></div>`;
  }

  html += '<div class="sec-label"><span class="sec-badge gold">TOP20</span></div>';
  data.top20.slice(0,10).forEach(s=>{
    const chgClass = s.change_pct>0?'up':s.change_pct<0?'dn':'flat';
    html += `<div class="stock-card"><div class="rank-col"><div class="rank-num">${s.rank}</div></div><div class="card-mid"><div class="card-name-row"><div class="card-name">${s.name}</div><div class="card-code">${s.code}</div></div></div><div class="card-right"><div class="card-price">${s.price.toLocaleString()}</div><div class="card-chg ${chgClass}">${s.change_pct>0?'+':''}${s.change_pct}%</div></div></div>`;
  });

  content.innerHTML = html;
  document.getElementById('update-bar').textContent = 'Updated: '+new Date().toLocaleTimeString('ko-KR');
}

function openLogin(){
  document.getElementById('loginModal').classList.add('open');
}

// 초기 실행
render();
</script>
</body>
  </html>

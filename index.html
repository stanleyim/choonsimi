<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CHOONSIMI">
<title>CHOONSIMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#0B1120;--bg2:#131B2E;--bg3:#1A2438;--bg4:#222E45;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#DDE3F0;--text2:#7A86A0;--text3:#3E4A60;
  --up:#E84040;--dn:#3D88FF;--accent:#3D88FF;
  --green:#2ECC8E;--green-bg:rgba(46,204,142,0.10);
  --gold:#F0A500;--gold-bg:rgba(240,165,0,0.10);
  --warn:#F5B731;--warn-bg:rgba(245,183,49,0.10);
  --up-bg:rgba(232,64,64,0.10);--dn-bg:rgba(61,136,255,0.10);
  --radius:13px;--radius-sm:9px;--radius-xs:6px;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:56px}
.wrap{max-width:480px;margin:0 auto;padding:0 14px}

/* ── 헤더 ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(11,17,32,.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;border-bottom:.5px solid var(--border);margin:0 -14px}
.h-left{display:flex;align-items:center;gap:12px}
.logo-img{width:40px;height:40px;border-radius:10px;object-fit:cover;flex-shrink:0;display:block}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#1A2438,#2a3a58);border:.5px solid rgba(240,165,0,0.3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);flex-shrink:0;letter-spacing:0}
.logo-text{line-height:1.1}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.5px;background:linear-gradient(135deg,#FFE566 0%,#F0A500 50%,#FFD700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(240,165,0,0.35));white-space:nowrap;line-height:1.1}
.logo-sub{font-size:9px;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-top:2px;font-weight:500}
.h-right{display:flex;align-items:center;gap:9px;flex-wrap:nowrap}
.date-pill{font-size:11px;font-weight:700;color:#fff;background:var(--bg4);padding:5px 11px;border-radius:20px;border:1px solid var(--border2);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;min-width:0;letter-spacing:.2px}
.login-btn{display:flex;align-items:center;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer;background:var(--green);color:#fff;border:none;white-space:nowrap;font-family:inherit;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(46,204,142,.25)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(46,204,142,.4)}
.login-btn:active{transform:translateY(0)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .28s ease both}

/* ── 레짐 카드 ── */
.regime-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:.5px solid var(--border);border-radius:var(--radius);padding:13px;margin:12px 0 8px;position:relative;overflow:hidden}
.regime-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--regime-color,var(--accent)) 0%,transparent 80%)}
.regime-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.regime-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.3px}
.regime-badge.up{background:var(--green-bg);color:var(--green)}
.regime-badge.dn{background:var(--up-bg);color:var(--up)}
.regime-badge.side{background:var(--warn-bg);color:var(--warn)}
.signal-wrap{display:flex;align-items:center;gap:2px}
.sig-cell{width:5px;height:9px;border-radius:1.5px;flex-shrink:0;background:var(--regime-color,var(--accent));transition:opacity .3s}
.sig-cell.off{background:rgba(255,255,255,.08)}
.conf-row{display:flex;align-items:center;gap:8px}
.conf-txt{font-size:11px;font-weight:600}

/* ── 성과 ── */
.perf-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.perf-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.perf-label{font-size:9px;color:var(--text2);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.perf-val{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text)}
.perf-val.pos{color:var(--green)}.perf-val.neg{color:var(--up)}.perf-val.dim{color:var(--text2);font-size:11px;font-weight:600}

/* ── 성과 윈도우 탭 ── */
.perf-tabs{display:flex;gap:4px;margin-bottom:6px;background:var(--bg2);padding:3px;border-radius:8px;border:.5px solid var(--border)}
.perf-tab{flex:1;text-align:center;font-size:10px;font-weight:700;padding:5px 6px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .2s;letter-spacing:.5px;border:none;background:none;font-family:inherit}
.perf-tab.active{background:var(--bg4);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.perf-tab:hover:not(.active){color:var(--text)}
.perf-sample{font-size:9px;color:var(--text3);text-align:right;margin-top:3px;font-family:var(--mono)}

/* ── 섹션 라벨 ── */
.sec-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--text);letter-spacing:1px;text-transform:uppercase;padding:9px 0 6px}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--border)}
.sec-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;border:.5px solid;letter-spacing:.4px}
.sec-badge.gold{color:var(--gold);border-color:rgba(240,165,0,.4);background:var(--gold-bg)}
.sec-badge.blue{color:var(--accent);border-color:rgba(61,136,255,.4);background:var(--dn-bg)}
.sec-badge.dim{color:var(--text2);border-color:var(--border2);background:var(--bg3);font-weight:600}
.sec-badge.green{color:var(--green);border-color:rgba(46,204,142,.4);background:var(--green-bg)}

/* ── 종목 카드 ── */
.stock-card{display:flex;align-items:center;gap:9px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;margin-bottom:4px;cursor:pointer;transition:transform .1s,background .15s,border-color .15s}
.stock-card:active{transform:scale(.98)}
.stock-card:hover{background:var(--bg3);border-color:var(--border2)}
.stock-card.t3{background:linear-gradient(135deg,rgba(240,165,0,.05) 0%,var(--bg2) 60%);border-color:rgba(240,165,0,.16)}
.stock-card.t10{border-color:rgba(61,136,255,.10)}
.rank-col{min-width:22px;display:flex;justify-content:center}
.rank-num{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text3)}
.rank-num.gold{color:var(--gold);font-size:15px}
.card-mid{flex:1;min-width:0}
.card-name-row{display:flex;align-items:baseline;gap:5px;white-space:nowrap;overflow:hidden}
.card-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis}
.card-name.bold{font-weight:700}
.card-code{font-size:9px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.score-row{display:flex;align-items:center;gap:4px;margin-top:3px}
.score-bar{flex:1;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.score-fill{height:100%;border-radius:1px;background:var(--accent)}
.score-fill.gold-bar{background:linear-gradient(90deg,var(--accent),var(--gold))}
.score-num{font-size:9px;color:var(--text3);font-family:var(--mono);min-width:22px;text-align:right}
.card-right{text-align:right;flex-shrink:0}
.card-price{font-size:12px;font-weight:500;font-family:var(--mono);color:var(--text)}
.card-chg{font-size:11px;font-weight:700;font-family:var(--mono);margin-top:3px}
.card-chg.up{color:var(--up)}.card-chg.dn{color:var(--dn)}.card-chg.flat{color:var(--text3)}

/* ── Entry 카드 ── */
.entry-card{display:flex;align-items:center;gap:9px;background:linear-gradient(135deg,rgba(46,204,142,.07) 0%,var(--bg2) 70%);border:.5px solid rgba(46,204,142,.2);border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:4px;cursor:pointer;transition:transform .1s,border-color .15s}
.entry-card:active{transform:scale(.98)}
.entry-card:hover{border-color:rgba(46,204,142,.4)}
.entry-tag{font-size:8px;font-weight:700;color:var(--green);background:var(--green-bg);border:.5px solid rgba(46,204,142,.3);border-radius:6px;padding:2px 6px;letter-spacing:.4px;white-space:nowrap}
.entry-score{font-family:var(--mono);font-size:11px;color:var(--green);font-weight:700}

/* ── 빈 상태 ── */
.state-box{text-align:center;padding:56px 20px;color:var(--text2);font-size:13px}
.state-box i{font-size:28px;display:block;margin-bottom:10px;opacity:.4}
.empty-entry{text-align:center;padding:22px 20px;color:var(--text3);font-size:12px;background:var(--bg2);border:.5px dashed var(--border);border-radius:var(--radius-sm)}
.empty-entry i{font-size:22px;display:block;margin-bottom:8px;opacity:.3}
.update-bar{text-align:center;font-size:9px;color:var(--text3);padding:12px 0 4px;font-family:var(--mono)}
.update-bar.stale{color:var(--warn)}

/* ── 준비중 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}
.modal-bg.open{display:flex}
.coming-box{width:100%;max-width:280px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--radius);padding:28px 22px;text-align:center;animation:fadeUp .22s ease;position:relative}
.coming-ico{font-size:32px;color:var(--gold);margin-bottom:12px}
.coming-ttl{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.coming-sub{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.coming-close{width:100%;padding:10px;background:var(--bg3);color:var(--text2);border:.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;cursor:pointer;font-family:inherit}
.coming-close:hover{border-color:var(--border2);color:var(--text)}

/* ════ 팝업 Bottom Sheet ════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.sheet{width:100%;max-width:480px;background:var(--bg2);border-radius:20px 20px 0 0;border-top:.5px solid var(--border2);max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);overscroll-behavior:contain}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:11px auto 0}
.p-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 0}
.p-name{font-size:17px;font-weight:700}
.p-code{font-size:10px;color:var(--text3);font-family:var(--mono);margin-left:7px}
.p-close-btn{background:none;border:.5px solid var(--border);color:var(--text2);width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0}
.p-price-row{display:flex;align-items:baseline;gap:7px;padding:6px 18px 12px;border-bottom:.5px solid var(--border)}
.p-price{font-size:22px;font-weight:700;font-family:var(--mono)}
.p-chg{font-size:13px;font-weight:700;font-family:var(--mono)}
.p-verdict{display:flex;align-items:flex-start;gap:11px;padding:12px 18px;border-bottom:.5px solid var(--border)}
.v-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.v-dot.green{background:var(--green)}.v-dot.yellow{background:var(--warn)}.v-dot.red{background:var(--up)}
.v-main{font-size:14px;font-weight:700;line-height:1.3}
.v-sub{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4}
.p-strength{padding:11px 18px;border-bottom:.5px solid var(--border)}
.p-str-hd{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:6px}
.p-str-num{font-family:var(--mono);color:var(--text);font-weight:500}
.p-bar-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.p-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s ease}
.p-metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 18px;border-bottom:.5px solid var(--border)}
.p-metric{background:var(--bg3);border-radius:var(--radius-xs);padding:9px 11px}
.p-metric-label{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.p-metric-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text)}
.p-metric-val.gold{color:var(--gold)}.p-metric-val.green{color:var(--green)}.p-metric-val.red{color:var(--up)}.p-metric-val.muted{color:var(--text3)}
.p-sec-ttl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;padding:12px 18px 5px}
.p-why-item{display:flex;align-items:flex-start;gap:10px;padding:8px 18px;border-top:.5px solid var(--border)}
.p-why-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.p-why-icon.pos{background:var(--green-bg);color:var(--green)}
.p-why-icon.neu{background:var(--warn-bg);color:var(--warn)}
.p-why-icon.neg{background:var(--up-bg);color:var(--up)}
.p-why-text{font-size:12px;font-weight:500;line-height:1.3}
.p-why-sub{font-size:10px;color:var(--text2);margin-top:3px}
.p-risk{display:flex;align-items:flex-start;gap:8px;margin:10px 18px;padding:10px 12px;background:var(--warn-bg);border:.5px solid rgba(245,183,49,.22);border-radius:var(--radius-xs)}
.p-risk i{color:var(--warn);font-size:14px;flex-shrink:0;margin-top:1px}
.p-risk-text{font-size:11px;color:var(--text2);line-height:1.5}
.p-naver{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 18px 26px;padding:11px;border:.5px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;color:var(--accent);cursor:pointer;background:none;font-family:inherit;transition:background .15s;text-decoration:none}
.p-naver:hover{background:var(--dn-bg)}
</style>
</head>

<div class="wrap">

  <!-- ── 헤더 ── -->
  <div class="header">
    <div class="h-left">
      <img class="logo-img" src="choonsimi-logo.jpg" alt="CHOONSIMI"
           onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
      <div class="logo-icon" id="logo-fallback" style="display:none">C</div>
      <div class="logo-text">
        <div class="logo-main">CHOONSIMI</div>
        <div class="logo-sub">AI 매수 시그널</div>
      </div>
    </div>
    <div class="h-right">
      <div class="date-pill" id="date-pill">—</div>
      <button class="login-btn" onclick="openComing()">로그인</button>
    </div>

  <!-- ── 메인 ── -->
  <div id="main">
    <div class="state-box">
      <i class="ti ti-loader" style="animation:spin 1s linear infinite"></i>

  <div class="update-bar" id="update-bar"></div>

</div>

<!-- ════ 준비중 모달 ════ -->
<div class="modal-bg" id="coming-modal">
  <div class="coming-box">
    <div class="coming-ico"><i class="ti ti-lock"></i></div>
    <div class="coming-ttl">로그인 준비 중</div>
    <div class="coming-sub">회원 기능은 곧 오픈됩니다.<br>조금만 기다려주세요!</div>
    <button class="coming-close" onclick="closeComing()">확인</button>
  </div>
</div>

<!-- ════ Bottom Sheet ════ -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-body"></div>
  </div>
</div>

async function loadData() {

/* ════════════════════════════════
   FORMATTERS
════════════════════════════════ */
const fmtP = v => Number(v).toLocaleString('ko-KR');
const fmtC = v => (v > 0 ? '+' : '') + Number(v).toFixed(2) + '%';
const fmtR = v => v != null ? (v > 0 ? '+' : '') + Number(v).toFixed(2) + '%' : '—';
const cc   = v => v > 0 ? 'up' : v < 0 ? 'dn' : 'flat';

function sigBars(conf, regime) {
  const col = regime==='UPTREND'?'var(--green)':regime==='DOWNTREND'?'var(--up)':'var(--warn)';
  const on  = Math.round((conf||0) * 20);
  let h = `<div class="signal-wrap" style="--regime-color:${col}">`;
  for (let i = 1; i <= 20; i++) {
    if (i <= on) {
      // 활성 (왼쪽부터 채움) - 좌측이 가장 진하고 우측으로 갈수록 흐림
      const op = on > 0 ? (1.0 - ((i - 1) / on) * 0.65) : 1;
      h += `<div class="sig-cell" style="opacity:${op.toFixed(2)}"></div>`;
    } else {
      // 비활성 (오른쪽)
      h += `<div class="sig-cell off"></div>`;
    }
  }
  return h + '</div>';
}

/* ════════════════════════════════
   POPUP 내용
════════════════════════════════ */
function verdict(s) {
  const sc = s.score || 0, exp = s.expected_return_5d || 0;
  if (sc >= 80 && exp >= 2.0) return {dot:'green', main:'강력 매수 시그널', sub:`AI 점수 ${sc}점 · 5일 예상 +${exp.toFixed(2)}% — 기관 수급과 모멘텀이 동시에 강합니다.`};
  if (sc >= 70 && exp >= 1.5) return {dot:'green', main:'매수 추천', sub:`AI 점수 ${sc}점 · 5일 예상 +${exp.toFixed(2)}% — 수급 흐름이 긍정적입니다.`};
  if (sc >= 65)               return {dot:'yellow', main:'관심 종목', sub:`AI 점수 ${sc}점 — 수급·모멘텀 복합 점수 상위권. 추가 확인 후 진입 검토.`};
  return                             {dot:'red', main:'중립 / 관망', sub:`AI 점수 ${sc}점 — 현재 조건이 진입 기준에 미치지 못합니다.`};
}

function whyItems(s) {
  const rows = [];
  s.score >= 75
    ? rows.push({c:'pos', i:'ti-trending-up',    t:'수급 강세',         d:'기관·외국인 순매수 흐름이 긍정적입니다.'})
    : rows.push({c:'neu', i:'ti-minus',           t:'수급 중립',         d:'뚜렷한 수급 방향성이 확인되지 않습니다.'});

  const chg = s.change_pct || 0;
  if (chg > 0 && chg <= 10) rows.push({c:'pos', i:'ti-chart-bar',         t:`모멘텀 +${chg.toFixed(2)}%`, d:'적정 상승 구간으로 추격 리스크가 낮습니다.'});
  else if (chg > 10)        rows.push({c:'neu', i:'ti-alert-triangle',    t:`급등 +${chg.toFixed(2)}%`,   d:'단기 급등. 진입 타이밍을 신중히 검토하세요.'});
  else                      rows.push({c:'neg', i:'ti-trending-down',     t:`하락 ${chg.toFixed(2)}%`,    d:'현재 하락 모멘텀이 감지됩니다.'});

  if (s.roe != null) {
    s.roe > 10 ? rows.push({c:'pos', i:'ti-building-bank', t:`ROE ${s.roe.toFixed(1)}% — 우수`, d:'자기자본이익률이 양호합니다.'})
    : s.roe > 0 ? rows.push({c:'neu', i:'ti-building-bank', t:`ROE ${s.roe.toFixed(1)}%`,        d:'수익성이 평균 수준입니다.'})
                : rows.push({c:'neg', i:'ti-building-bank', t:`ROE ${s.roe.toFixed(1)}%`,        d:'현재 수익성이 낮습니다.'});
  }

  const exp = s.expected_return_5d || 0;
  exp >= 1.5
    ? rows.push({c:'pos', i:'ti-target', t:`5일 예상 +${exp.toFixed(2)}%`, d:'알고리즘 기준 긍정적 수익 구간.'})
    : rows.push({c:'neu', i:'ti-target', t:`5일 예상 +${exp.toFixed(2)}%`, d:'예상 수익률이 낮은 편입니다.'});

  return rows.map(r => `
    <div class="p-why-item">
      <div class="p-why-icon ${r.c}"><i class="ti ${r.i}"></i></div>
      <div><div class="p-why-text">${r.t}</div><div class="p-why-sub">${r.d}</div></div>
    </div>`).join('');
}

function buildSheet(s) {
  const v     = verdict(s);
  const sign  = s.change_pct > 0 ? '+' : '';
  const roe   = s.roe != null ? s.roe.toFixed(2) + '%' : '—';
  const debt  = s.debt_ratio != null ? s.debt_ratio.toFixed(1) + '%' : '—';
  const roeCls  = s.roe == null ? 'muted' : s.roe >= 10 ? 'green' : s.roe >= 0 ? '' : 'red';
  const debtCls = s.debt_ratio == null ? 'muted' : s.debt_ratio < 100 ? 'green' : s.debt_ratio < 200 ? '' : 'red';

  return `
    <div class="p-head">
      <div style="display:flex;align-items:baseline;gap:7px;flex-wrap:wrap">
        <span class="p-name">${s.name}</span><span class="p-code">${s.code}</span>
      </div>
      <button class="p-close-btn" onclick="closeSheet()"><i class="ti ti-x"></i></button>
    </div>
    <div class="p-price-row">
      <span class="p-price">${fmtP(s.price)}<small style="font-size:13px;color:var(--text2)">원</small></span>
      <span class="p-chg ${cc(s.change_pct)}">${sign}${(s.change_pct||0).toFixed(2)}%</span>
    </div>
    <div class="p-verdict">
      <div class="v-dot ${v.dot}" style="margin-top:5px"></div>
      <div><div class="v-main">${v.main}</div><div class="v-sub">${v.sub}</div></div>
    </div>
    <div class="p-strength">
      <div class="p-str-hd"><span>AI 시그널 강도</span><span class="p-str-num">${s.score} / 100</span></div>
      <div class="p-bar-track"><div class="p-bar-fill" style="width:${s.score}%"></div></div>
    </div>
    <div class="p-metrics-grid">
      <div class="p-metric"><div class="p-metric-label">5일 예상 수익</div><div class="p-metric-val gold">+${(s.expected_return_5d||0).toFixed(2)}%</div></div>
      <div class="p-metric"><div class="p-metric-label">랭킹</div><div class="p-metric-val gold"># ${s.rank}</div></div>
      <div class="p-metric"><div class="p-metric-label">ROE</div><div class="p-metric-val ${roeCls}">${roe}</div></div>
      <div class="p-metric"><div class="p-metric-label">부채비율</div><div class="p-metric-val ${debtCls}">${debt}</div></div>
    </div>
    <div class="p-sec-ttl">분석 근거</div>
    ${whyItems(s)}
    <div class="p-risk">
      <i class="ti ti-alert-circle"></i>
      <div class="p-risk-text">본 분석은 AI 알고리즘 기반 참고 정보입니다. 투자 손실에 대한 법적 책임을 지지 않으며, 최종 판단은 본인에게 있습니다.</div>
    </div>
    <a class="p-naver" href="https://finance.naver.com/item/main.naver?code=${s.code}" target="_blank" rel="noopener">
      <i class="ti ti-external-link"></i> 네이버 금융에서 상세 보기
    </a>`;
}

  const rCol = d.regime==='UPTREND'?'var(--green)':d.regime==='DOWNTREND'?'var(--up)':'var(--warn)';

  const rLbl = d.regime==='UPTREND'?'상승 추세':d.regime==='DOWNTREND'?'하락 추세':'횡보';

  // ── 성과 (1D / 5D / 20D / ALL 윈도우) ──

    today: d.performance_today || {},
    d5   : d.performance_5d    || {},
    d20  : d.performance_20d   || {},
    all  : d.performance_all   || {},

  function renderPerfBox(p) {
    const isAccum = !p || (!p.win_rate && !p.avg_return);
    if (isAccum) {
      return `
        <div class="perf-row">
          <div class="perf-box"><div class="perf-label">WIN RATE</div><div class="perf-val dim">축적중</div></div>
          <div class="perf-box"><div class="perf-label">AVG RETURN</div><div class="perf-val dim">—</div></div>
          <div class="perf-box"><div class="perf-label">TOP5 RETURN</div><div class="perf-val dim">—</div></div>
        </div>
        <div class="perf-sample">표본 ${p.sample||0}건 · ${p.days||0}일</div>`;
    }
    return `
      <div class="perf-row">
        <div class="perf-box"><div class="perf-label">WIN RATE</div><div class="perf-val ${p.win_rate>=50?'pos':'neg'}">${p.win_rate.toFixed(1)}%</div></div>
        <div class="perf-box"><div class="perf-label">AVG RETURN</div><div class="perf-val ${p.avg_return>=0?'pos':'neg'}">${fmtR(p.avg_return)}</div></div>
        <div class="perf-box"><div class="perf-label">TOP5 RETURN</div><div class="perf-val ${p.top5_return>=0?'pos':'neg'}">${fmtR(p.top5_return)}</div></div>
      </div>
      <div class="perf-sample">표본 ${p.sample||0}건 · ${p.days||0}일</div>`;
  }

  // 기본: 1D 탭 활성
  const perfHTML = `
    <div class="perf-tabs">
      <button class="perf-tab active" data-w="today">1D</button>
      <button class="perf-tab" data-w="d5">5D</button>
      <button class="perf-tab" data-w="d20">20D</button>
      <button class="perf-tab" data-w="all">ALL</button>
    </div>
    <div id="perf-content">${renderPerfBox(perfMap.today)}</div>`;

  // 탭 클릭 이벤트는 렌더 후 바인딩
  window._perfMap         = perfMap;
  window._renderPerfBox   = renderPerfBox;

  const core = (d.top5_core && d.top5_core.length) ? d.top5_core : d.top20.slice(0,5);
  const coreHTML = core.map(s => `
    <div class="stock-card ${s.rank<=3?'t3':''} fade-up" onclick="cardClick(${s.rank})">
      <div class="rank-col"><span class="rank-num ${s.rank<=3?'gold':''}">${s.rank}</span></div>
      <div class="card-mid">
        <div class="card-name-row"><span class="card-name bold">${s.name}</span><span class="card-code">${s.code}</span></div>
        <div class="score-row"><div class="score-bar"><div class="score-fill gold-bar" style="width:${s.score}%"></div></div><span class="score-num">${s.score}</span></div>
      </div>
      <div class="card-right"><div class="card-price">${fmtP(s.price)}</div><div class="card-chg ${cc(s.change_pct)}">${fmtC(s.change_pct)}</div></div>
    </div>`).join('');

  const top20HTML = d.top20.map(s => `
    <div class="stock-card ${s.rank<=3?'t3':s.rank<=10?'t10':''}" onclick="cardClick(${s.rank})">

        <div class="card-name-row"><span class="card-name">${s.name}</span><span class="card-code">${s.code}</span></div>
        <div class="score-row"><div class="score-bar"><div class="score-fill ${s.rank<=3?'gold-bar':''}" style="width:${s.score}%"></div></div><span class="score-num">${s.score}</span></div>
      </div>
      <div class="card-right"><div class="card-price">${fmtP(s.price)}</div><div class="card-chg ${cc(s.change_pct)}">${fmtC(s.change_pct)}</div></div>
    </div>`).join('');

  const entry = d.entry_top5 && d.entry_top5.length;
  const entryHTML = entry
    ? d.entry_top5.map(s => `
        <div class="entry-card" onclick="cardClick(${s.rank}, true)">
          <div class="rank-col"><span class="rank-num gold">${s.rank}</span></div>
          <div class="card-mid">
            <div class="card-name-row"><span class="card-name bold">${s.name}</span><span class="card-code">${s.code}</span></div>
            <div class="score-row" style="margin-top:3px"><span class="entry-tag">ENTRY</span><span class="entry-score" style="margin-left:6px">${s.entry_score}</span></div>
          </div>
          <div class="card-right"><div class="card-price">${fmtP(s.price)}</div><div class="card-chg ${cc(s.change_pct)}">${fmtC(s.change_pct)}</div></div>
        </div>`).join('')
    : `<div class="empty-entry"><i class="ti ti-antenna-bars-off"></i>진입 조건 충족 종목 없음<div style="margin-top:6px;font-size:11px">Flow>0 · 거래량 1.3배↑ · 모멘텀 0.5~6% 범위</div></div>`;

  document.getElementById('main').innerHTML = `
    <div class="regime-card fade-up" style="--regime-color:${rCol}">
      <div class="regime-top">
        <div class="regime-badge ${rCls}"><span>●</span> ${rLbl}</div>

        <span class="conf-txt" style="color:var(--green)">v7.3.1</span>
      </div>
    </div>

    <div class="sec-label">신호 성과 ${(perfMap.all.sample||0)===0?'<span class="sec-badge dim">데이터 축적중</span>':`<span class="sec-badge blue">검증 ${perfMap.all.sample}건</span>`}</div>
    ${perfHTML}

    ${coreHTML}

    <div class="sec-label" style="margin-top:4px">TOP 20 <span class="sec-badge blue">전체 추천</span></div>
    ${top20HTML}

    <div class="sec-label" style="margin-top:4px">ENTRY SIGNAL <span class="sec-badge green">진입 타이밍</span></div>
    ${entryHTML}
  `;

  /* update-bar — result.json 업데이트 날짜 기준 */
  const todayStr  = new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Seoul'});
  const bizDay    = d.biz_day || d.date;
  const runAt     = d.run_at ? ' · ' + d.run_at.slice(11,16) + ' 업데이트' : '';
  const isStale   = bizDay && bizDay !== todayStr;
  const updateBar = document.getElementById('update-bar');
  updateBar.textContent = isStale
    ? '⚠ 데이터 기준일: ' + bizDay + ' · 장 휴장일'
    : '기준일: ' + bizDay + runAt + '  ·  v7.3.1 Choonsimi Core';
  updateBar.classList.toggle('stale', isStale);

  /* 성과 탭 클릭 바인딩 */
  document.querySelectorAll('.perf-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.perf-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const w = btn.dataset.w;
      const p = window._perfMap[w] || {};
      document.getElementById('perf-content').innerHTML = window._renderPerfBox(p);
    });
  });
}

/* ════════════════════════════════
   카드 클릭 → 팝업 (로그인 불필요)
════════════════════════════════ */
function cardClick(rank, isEntry) {
  let s = null;
  if (isEntry && DATA.entry_top5 && DATA.entry_top5.length) {
    const e = DATA.entry_top5.find(x => x.rank === rank);
    if (e) s = {...e, score: e.entry_score || e.score};
  }
  if (!s) s = DATA.top20.find(x => x.rank === rank);
  if (!s && DATA.top5_core) s = DATA.top5_core.find(x => x.rank === rank);
  if (!s) return;

  document.getElementById('sheet-body').innerHTML = buildSheet(s);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeSheet();
}

/* ════════════════════════════════
   준비중 모달
════════════════════════════════ */
function openComing() {
  document.getElementById('coming-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeComing() {
  document.getElementById('coming-modal').classList.remove('open');
  document.body.style.overflow = '';
}

/* ════════════════════════════════
   ESC
════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  closeSheet();
  closeComing();
});

document.getElementById('coming-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('coming-modal')) closeComing();
});

/* ════════════════════════════════
   BOOT
════════════════════════════════ */
loadData();
</script>
</body>
</html>

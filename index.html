<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>choonsimi</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="header">
    <h1>📊 choonsimi</h1>
    <p>KRX AI 투자 신호</p>
    <p id="updatedAt" class="updated">loading...</p>
  </div>
  <div id="list" class="list">
    <div class="card skeleton"></div>
    <div class="card skeleton"></div>
    <div class="card skeleton"></div>
  </div>
<script>
async function loadData() {
  try {
    const res = await fetch('/data.json?v=' + Date.now());
    const json = await res.json();

    // ✅ time 필드 사용
    const date = new Date(json.time);
    const updated = `${date.getMonth()+1}월 ${date.getDate()}일 ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
    document.getElementById("updatedAt").innerText = `업데이트: ${updated}`;

    const list = document.getElementById("list");
    list.innerHTML = "";

    json.top10.forEach((item, idx) => {
      const rank = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : (idx + 1);

      // ✅ score 기반 signal 생성
      const signal = item.score >= 15 ? "STRONG" : item.score >= 10 ? "BUY" : "WATCH";
      const signalClass = signal === "STRONG" ? "strong" : signal === "BUY" ? "buy" : "watch";

      // ✅ dart_score 기반 신뢰도 생성
      const confidence = Math.round((item.dart_score / 10) * 100);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-top">
          <div class="rank">${rank} ${item.code}</div>
          <div class="badge ${signalClass}">${signal}</div>
        </div>
        <div class="metrics">
          <div class="metric">
            <span class="label">AI 점수</span>
            <span class="value">${item.score.toFixed(2)}</span>
          </div>
          <div class="metric">
            <span class="label">DART 점수</span>
            <span class="value confidence">${item.dart_score.toFixed(2)}</span>
          </div>
          <div class="metric">
            <span class="label">현재가</span>
            <span class="value">${item.close.toLocaleString()}원</span>
          </div>
        </div>
        <div class="reason">기준일: ${json.data_date} | 모드: ${json.mode}</div>
      `;
      list.appendChild(card);
    });
  } catch (e) {
    console.error(e);
    document.getElementById("list").innerHTML =
      "<div class='card error'>데이터를 불러오지 못했습니다. 새로고침해주세요.</div>";
  }
}
loadData();
</script>
</body>
</html>

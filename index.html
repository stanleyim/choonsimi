<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CHOONSIMI">
<title>CHOONSIMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0B1120;--bg2:#131B2E;--bg3:#1A2438;--bg4:#222E45;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#DDE3F0;--text2:#7A86A0;--text3:#3E4A60;
  --up:#E84040;--dn:#3D88FF;--accent:#3D88FF;
  --green:#2ECC8E;--green-bg:rgba(46,204,142,0.10);
  --gold:#F0A500;--gold-bg:rgba(240,165,0,0.10);
  --warn:#F5B731;--warn-bg:rgba(245,183,49,0.10);
  --up-bg:rgba(232,64,64,0.10);--dn-bg:rgba(61,136,255,0.10);
  --radius:13px;--radius-sm:9px;--radius-xs:6px;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:56px}
.wrap{max-width:480px;margin:0 auto;padding:0 14px}

/* ── 헤더 ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(11,17,32,.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;border-bottom:.5px solid var(--border);margin:0 -14px}
.h-left{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:#0B1120;flex-shrink:0}
.logo-text{line-height:1.1}

/* CHOONSIMI 멋진 글자 */
.logo-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:3px;
  background:linear-gradient(135deg,#FFE566 0%,#F0A500 50%,#FFD700 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 8px rgba(240,165,0,0.35));
  white-space:nowrap;
  line-height:1.1;
}
.logo-sub{font-size:8px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

.h-right{display:flex;align-items:center;gap:7px}
.date-pill{font-size:10px;color:var(--text2);background:var(--bg3);padding:4px 9px;border-radius:20px;border:.5px solid var(--border);font-family:var(--mono);white-space:nowrap}
.login-btn{display:flex;align-items:center;font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;cursor:pointer;background:var(--accent);color:#fff;border:none;white-space:nowrap;font-family:inherit;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.user-chip{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);background:var(--bg3);border:.5px solid var(--border);padding:4px 10px;border-radius:20px;cursor:pointer;font-family:var(--mono);white-space:nowrap}
.u-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .28s ease both}

/* ── 레짐 카드 ── */
.regime-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:.5px solid var(--border);border-radius:var(--radius);padding:13px;margin:12px 0 8px;position:relative;overflow:hidden}
.regime-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--regime-color,var(--accent)) 0%,transparent 80%)}
.regime-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.regime-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.3px}
.regime-badge.up{background:var(--green-bg);color:var(--green)}
.regime-badge.dn{background:var(--up-bg);color:var(--up)}
.regime-badge.side{background:var(--warn-bg);color:var(--warn)}
.signal-wrap{display:flex;align-items:flex-end;gap:3px;height:22px}
.sig-bar{border-radius:2px;background:var(--regime-color,var(--accent));flex-shrink:0}
.sig-bar.off{opacity:.13}
.sig-bar.b1{width:5px;height:4px}.sig-bar.b2{width:5px;height:6px}.sig-bar.b3{width:5px;height:8px}
.sig-bar.b4{width:5px;height:10px}.sig-bar.b5{width:5px;height:12px}.sig-bar.b6{width:5px;height:14px}
.sig-bar.b7{width:5px;height:16px}.sig-bar.b8{width:5px;height:18px}.sig-bar.b9{width:5px;height:20px}
.sig-bar.b10{width:5px;height:22px}
.conf-row{display:flex;align-items:center;gap:8px}
.conf-txt{font-size:10px;color:var(--text2)}

/* ── 통계 ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.stat-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.stat-label{font-size:9px;color:var(--text3);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.stat-val{font-size:16px;font-weight:700;font-family:var(--mono)}
.stat-val.up{color:var(--up)}.stat-val.dn{color:var(--dn)}

/* ── 섹션 라벨 ── */
.sec-label{display:flex;align-items:center;gap:7px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:7px 0 5px}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--border)}
.sec-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;border:.5px solid;letter-spacing:.4px}
.sec-badge.gold{color:var(--gold);border-color:rgba(240,165,0,.3);background:var(--gold-bg)}
.sec-badge.blue{color:var(--accent);border-color:rgba(61,136,255,.3);background:var(--dn-bg)}
.sec-badge.dim{color:var(--text3);border-color:var(--border);background:none}

/* ── 종목 카드 ── */
.stock-card{display:flex;align-items:center;gap:9px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;margin-bottom:4px;cursor:pointer;transition:transform .1s,background .15s,border-color .15s}
.stock-card:active{transform:scale(.98)}
.stock-card:hover{background:var(--bg3);border-color:var(--border2)}
.stock-card.t3{background:linear-gradient(135deg,rgba(240,165,0,.05) 0%,var(--bg2) 60%);border-color:rgba(240,165,0,.16)}
.stock-card.t10{border-color:rgba(61,136,255,.10)}
.rank-col{min-width:22px;display:flex;justify-content:center}
.rank-num{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text3)}
.rank-num.gold{color:var(--gold);font-size:15px}
.card-mid{flex:1;min-width:0}
.card-name-row{display:flex;align-items:baseline;gap:5px;white-space:nowrap;overflow:hidden}
.card-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis}
.card-name.bold{font-weight:700}
.card-code{font-size:9px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.score-row{display:flex;align-items:center;gap:4px;margin-top:3px}
.score-bar{flex:1;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.score-fill{height:100%;border-radius:1px;background:var(--accent)}
.score-fill.gold-bar{background:var(--gold)}.score-fill.dim{opacity:.28}
.score-num{font-size:9px;color:var(--text3);font-family:var(--mono);min-width:22px;text-align:right}
.card-right{text-align:right;flex-shrink:0}
.card-price{font-size:12px;font-weight:500;font-family:var(--mono);color:var(--text)}
.card-chg{font-size:11px;font-weight:700;font-family:var(--mono);margin-top:3px}
.card-chg.up{color:var(--up)}.card-chg.dn{color:var(--dn)}.card-chg.flat{color:var(--text3)}

.state-box{text-align:center;padding:56px 20px;color:var(--text2);font-size:13px}
.state-box i{font-size:28px;display:block;margin-bottom:10px;opacity:.4}
.update-bar{text-align:center;font-size:9px;color:var(--text3);padding:12px 0 4px;font-family:var(--mono)}

/* ════ 모달 배경 ════ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}
.modal-bg.open{display:flex}

/* ── 로그인/회원가입 모달 ── */
.auth-box{width:100%;max-width:340px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--radius);padding:24px 22px;position:relative;animation:fadeUp .22s ease}
.auth-head{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px}
.auth-head img{width:44px;height:44px;border-radius:10px;background:#0B1120}
.auth-head .auth-ttl{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  background:linear-gradient(135deg,#FFE566,#F0A500,#FFD700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-head .auth-sub{font-size:11px;color:var(--text2)}
.auth-close-btn{position:absolute;top:14px;right:14px;background:none;border:.5px solid var(--border);color:var(--text2);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.auth-tab{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:16px;gap:3px}
.auth-tab-btn{flex:1;padding:7px;border-radius:6px;font-size:12px;font-weight:500;color:var(--text2);background:none;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.auth-tab-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.auth-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block}
.auth-field{margin-bottom:11px}
.auth-input{width:100%;padding:10px 12px;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-xs);font-size:13px;color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--text3)}
.auth-submit{width:100%;padding:12px;margin-top:4px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit;white-space:nowrap}
.auth-submit:hover{opacity:.88}
.auth-submit:disabled{opacity:.5;cursor:not-allowed}
.auth-msg{font-size:11px;text-align:center;margin-top:9px;min-height:16px;line-height:1.4}
.auth-msg.err{color:var(--up)}.auth-msg.ok{color:var(--green)}

/* ── 잠금 모달 ── */
.lock-box{width:100%;max-width:290px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--radius);padding:26px 22px;text-align:center;animation:fadeUp .22s ease}
.lock-box .lock-ico{font-size:34px;color:var(--gold);margin-bottom:10px}
.lock-box h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:7px}
.lock-box p{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.lock-login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-xs);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit}
.lock-cancel-btn{width:100%;padding:9px;background:none;color:var(--text2);border:.5px solid var(--border);border-radius:var(--radius-xs);font-size:12px;cursor:pointer;font-family:inherit}

/* ════ 팝업 Bottom Sheet ════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.sheet{width:100%;max-width:480px;background:var(--bg2);border-radius:20px 20px 0 0;border-top:.5px solid var(--border2);max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);overscroll-behavior:contain}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:11px auto 0}
.p-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 0}
.p-name{font-size:17px;font-weight:700}
.p-code{font-size:10px;color:var(--text3);font-family:var(--mono);margin-left:7px}
.p-close-btn{background:none;border:.5px solid var(--border);color:var(--text2);width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.p-price-row{display:flex;align-items:baseline;gap:7px;padding:6px 18px 12px;border-bottom:.5px solid var(--border)}
.p-price{font-size:22px;font-weight:700;font-family:var(--mono)}
.p-chg{font-size:13px;font-weight:700;font-family:var(--mono)}
.p-verdict{display:flex;align-items:flex-start;gap:11px;padding:12px 18px;border-bottom:.5px solid var(--border)}
.v-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.v-dot.green{background:var(--green)}.v-dot.yellow{background:var(--warn)}.v-dot.red{background:var(--up)}
.v-main{font-size:14px;font-weight:700;line-height:1.3}
.v-sub{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4}
.p-strength{padding:11px 18px;border-bottom:.5px solid var(--border)}
.p-str-hd{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:6px}
.p-str-num{font-family:var(--mono);color:var(--text);font-weight:500}
.p-bar-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.p-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s ease}
.p-sec-ttl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;padding:12px 18px 5px}
.p-why-item{display:flex;align-items:flex-start;gap:10px;padding:8px 18px;border-top:.5px solid var(--border)}
.p-why-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.p-why-icon.pos{background:var(--green-bg);color:var(--green)}
.p-why-icon.neu{background:var(--warn-bg);color:var(--warn)}
.p-why-icon.neg{background:var(--up-bg);color:var(--up)}
.p-why-text{font-size:12px;font-weight:500;line-height:1.3}
.p-why-sub{font-size:10px;color:var(--text2);margin-top:3px}
.p-risk{display:flex;align-items:flex-start;gap:8px;margin:10px 18px;padding:10px 12px;background:var(--warn-bg);border:.5px solid rgba(245,183,49,.22);border-radius:var(--radius-xs)}
.p-risk i{color:var(--warn);font-size:14px;flex-shrink:0;margin-top:1px}
.p-risk-text{font-size:11px;color:var(--text2);line-height:1.5}
.p-naver{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 18px 26px;padding:11px;border:.5px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;color:var(--accent);cursor:pointer;background:none;font-family:inherit;transition:background .15s;text-decoration:none}
.p-naver:hover{background:var(--dn-bg)}
</style>
</head>
<body>

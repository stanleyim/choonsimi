name: DART Fundamental Update

on:
  schedule:
    - cron: '22 11 * * 0' # KST 일요일 20:22 = UTC 11:22
  workflow_dispatch: # 수동 실행 가능

jobs:
  update-fundamental:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run fetch DART fundamental
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python fetch_dart.py

      - name: Check output file
        run: |
          test -f fundamental.json || (echo "❌ fundamental.json 없음!" && exit 1)
          echo "✅ fundamental.json 검증 완료"
          echo "파일 크기: $(wc -c < fundamental.json) bytes"

      - name: Commit and push fundamental.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamental.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "update: fundamental.json $(date +'%Y-%m-%d')"
            git push
            echo "✅ fundamental.json 커밋 완료"
          fi

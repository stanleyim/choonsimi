name: DART Fundamental Update

permissions:
  contents: write

on:
  schedule:
    - cron: '9 10 * * 0' # KST 일요일 19:09 (UTC 10:09)
  workflow_dispatch:

concurrency:
  group: choonsimi-dart-lock
  cancel-in-progress: false

jobs:
  update-fundamental:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch DART fundamental
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python fetch_dart.py

      - name: Check output file
        run: |
          test -f fundamental.json || (echo "❌ fundamental.json 없음!" && exit 1)
          echo "✅ fundamental.json 검증 완료"
          echo "파일 크기: $(wc -c < fundamental.json) bytes"

      - name: Commit and push fundamental.json
        run: |
          git config --global user.name  "choonsimi-bot"
          git config --global user.email "bot@choonsimi.com"
          git add fundamental.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "chore: update fundamental.json $(date +'%Y-%m-%d')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            echo "✅ fundamental.json 커밋 완료"
          fi

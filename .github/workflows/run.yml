name: choonsimi-daily

permissions:
  contents: write

on:
  schedule:
    - cron: '2 11 * * 1-5'   # KST 20:02 (UTC 11:02) 월~금
  workflow_dispatch:

concurrency:
  group: choonsimi-lock
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Holiday (KRX)
      id: check_holiday
      run: |
        python -c "import holidays, datetime, sys; sys.exit(0 if datetime.date.today() in holidays.KR() else 1)" && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

    - name: Skip if Holiday
      if: steps.check_holiday.outputs.skip == 'true'
      run: echo "📅 Today is a holiday. Skipping workflow." && exit 0

    - name: Fetch Market Data (KIS → history.csv)
      env:
        KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      run: python fetch_data.py

    - name: Fetch KIS Flow (시장 수급)
      env:
        KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      run: python fetch_kis_flow.py

    - name: Fetch News (Naver → news_scores.json)
      env:
        NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      run: python fetch_news.py

    - name: Run Engine
      env:
        DART_API_KEY:   ${{ secrets.DART_API_KEY }}
      run: python -m engine.engine

    - name: Validate output
      run: |
        test -f result.json      || (echo "❌ result.json 없음!"    && exit 1)
        test -f history.csv      || (echo "❌ history.csv 없음!"    && exit 1)
        test -f market_flow.json || (echo "❌ market_flow.json 없음!" && exit 1)
        test -f news_scores.json || (echo "❌ news_scores.json 없음!" && exit 1)
        echo "✅ 출력 파일 검증 완료"

    - name: Commit & Push
      run: |
        git config --global user.name  "choonsimi-bot"
        git config --global user.email "bot@choonsimi.com"
        git add result.json market_flow.json news_scores.json
        git add history.csv signal_history.csv
        git add regime_cache.json      2>/dev/null || true
        git add fundamental.json       2>/dev/null || true
        git add api/_private/          2>/dev/null || true
        git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

name: choonsimi-daily

permissions:
  contents: write

on:
  schedule:
    - cron: '2 11 * * 1-5'   # KST 20:02 (UTC 11:02)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch Market Data (FDR)
      run: python fetch_data.py

    - name: Fetch KIS Flow (종목별 수급)
      env:
        KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      run: python fetch_kis_flow.py

    - name: Fetch DART (재무데이터)
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: python fetch_dart.py

    - name: Run Engine
      env:
        KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        DART_API_KEY:   ${{ secrets.DART_API_KEY }}
      run: python -m engine.engine

    - name: Commit & Push
      run: |
        git config --global user.name "choonsimi-bot"
        git config --global user.email "bot@choonsimi.com"
        git add result.json api/_private/history.csv stock_flow.json fundamental.json
        git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

name: KRX Quant Engine

on:
  schedule:
    - cron: '10 7 * * 1-5'   # KST 16:10 장 마감
    - cron: '0 13 * * 1-5'   # KST 22:00 야간 리밸런싱
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 🔥 무한 대기 방지

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # 🔥 pip 캐싱 활성화

      - name: Install dependencies
        timeout-minutes: 3
        run: |
          python -m pip install --upgrade pip
          # 버전 고정으로 의존성 해결 시간 단축
          pip install --only-binary :all: \
            pandas==2.3.3 numpy==2.4.4 requests==2.33.1 \
            pykrx==1.2.7 finance-datareader==0.9.110 lxml beautifulsoup4

      - name: Build Universe
        timeout-minutes: 5  # 🔥 5분 초과 시 실패 처리
        run: |
          python fetch_data.py

      - name: Run Engine
        timeout-minutes: 3
        run: |
          python engine/engine.py

      - name: Validate output
        timeout-minutes: 2
        run: |
          python - <<'EOF'
          import json, sys
          try:
              with open("result.json") as f: r = json.load(f)
              if not r.get("top10"): print("[FAIL] top10 empty"); sys.exit(1)
              print(f"[OK] result.json → {len(r['top10'])} stocks")
          except Exception as e:
              print(f"[FAIL] result.json: {e}"); sys.exit(1)
          try:
              with open("data.json") as f: d = json.load(f)
              if len(d.get("all", [])) < 50: print("[FAIL] universe too small"); sys.exit(1)
              print(f"[OK] data.json → {len(d['all'])} stocks")
          except Exception as e:
              print(f"[FAIL] data.json: {e}"); sys.exit(1)
          EOF

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add result.json portfolio.json ic_history.json history.csv data.json data.json.bak
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "[auto] update $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST"
          git push

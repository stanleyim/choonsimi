name: KRX Quant Engine

on:
  schedule:
    - cron: '10 7 * * 1-5'   # KST 16:10 (장 마감)
    - cron: '0 13 * * 1-5'   # KST 22:00 (야간 리밸런싱)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      # ─────────────────────────────
      # 1. Checkout
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ─────────────────────────────
      # 2. Python Setup + Cache
      # ─────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # ─────────────────────────────
      # 3. Dependencies
      # ─────────────────────────────
      - name: Install dependencies
        timeout-minutes: 3
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pykrx pandas numpy requests
          fi

      # ─────────────────────────────
      # 4. Universe Build
      # ─────────────────────────────
      - name: Build Universe
        timeout-minutes: 2
        run: |
          python fetch_data.py

      # ─────────────────────────────
      # 5. Engine Run
      # ─────────────────────────────
      - name: Run Engine
        timeout-minutes: 3
        run: |
          python engine/engine.py

      # ─────────────────────────────
      # 6. Validation
      # ─────────────────────────────
      - name: Validate output
        timeout-minutes: 2
        run: |
          python - <<'EOF'
          import json, sys

          # -------------------------
          # result.json check
          # -------------------------
          try:
              r = json.load(open("result.json"))
          except Exception as e:
              print("[FAIL] result.json error:", e)
              sys.exit(1)

          top10 = r.get("top10", [])
          if len(top10) == 0:
              print("[FAIL] empty top10")
              sys.exit(1)

          print(f"[OK] result.json → {len(top10)} stocks")

          for s in top10[:3]:
              print(f"{s['code']} | score={s['score']} | weight={round(s['weight'],4)}")

          # -------------------------
          # data.json check
          # -------------------------
          try:
              d = json.load(open("data.json"))
          except Exception as e:
              print("[FAIL] data.json error:", e)
              sys.exit(1)

          universe = d.get("all", [])
          if len(universe) < 50:
              print(f"[FAIL] universe too small: {len(universe)}")
              sys.exit(1)

          print(f"[OK] data.json → {len(universe)} stocks")

          changes = r.get("changes", {})
          print(f"[CHANGE] add={changes.get('add',[])} remove={changes.get('remove',[])}")
          EOF

      # ─────────────────────────────
      # 7. Commit Results (SAFE PUSH)
      # ─────────────────────────────
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json result.json portfolio.json ic_history.json history.csv data.json.bak

          git diff --cached --quiet && echo "No changes to commit." && exit 0

          git commit -m "[auto] update $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST"

          git pull --rebase origin main || true
          git push

name: choonsimi-daily

permissions:
  contents: write

on:
  schedule:
    - cron: '2 11 * * 1-5'   # KST 20:02 (UTC 11:02)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # PYTHON SETUP
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # =========================
    # DEPENDENCIES (FIXED)
    # =========================
    - name: Install deps
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # =========================
    # FETCH
    # =========================
    - name: Fetch Data
      run: |
        python fetch_data.py
        echo "=== FILE CHECK AFTER FETCH ==="
        ls -al
        find . -name "data.json"

    # =========================
    # ENGINE
    # =========================
    - name: Run Engine
      run: |
        python engine/engine.py
        echo "=== ENGINE OUTPUT CHECK ==="
        ls -al

    # =========================
    # VALIDATE
    # =========================
    - name: Validate Result
      run: python validator.py

    # =========================
    # COMMIT & PUSH (SAFE)
    # =========================
    - name: Commit & Push
      run: |
        git config --global user.name "choonsimi-bot"
        git config --global user.email "bot@choonsimi.com"

        # 안전하게 전체 변경 반영
        git add -A

        git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"

        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

    # =========================
    # OPTIONAL PUBLISH
    # =========================
    - name: Publish (optional)
      if: env.APP_API_URL != ''
      env:
        APP_API_URL: ${{ secrets.APP_API_URL }}
      run: python publish.py

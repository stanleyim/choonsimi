name: Stock Engine

on:
  schedule:
    - cron: "1 23 * * *"   # UTC 23:01 = KST 08:01
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install requests

      - run: python engine/engine.py
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      - run: |
          git config --global user.name "choonsimi-bot"
          git config --global user.email "bot@choonsimi.com"
          git add data.json
          git commit -m "update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push

name: Stock Engine

on:
  schedule:
    - cron: "0 23 * * 0-4"   # KST 08:00
    - cron: "0 11 * * 1-5"   # KST 20:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-engine
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pandas numpy requests beautifulsoup4

      - name: Run Engine
        run: |
          python engine/engine.py

      - name: Validate output
        run: |
          python - <<EOF
          import json, sys

          try:
              with open("result.json", encoding="utf-8") as f:
                  r = json.load(f)

              # engine v15 구조 대응
              if "top10" not in r or len(r["top10"]) == 0:
                  print("[FAIL] result.json 비어있음")
                  sys.exit(1)

              top = r["top10"][0]

              if top.get("score", 0) <= 0:
                  print("[FAIL] invalid score")
                  sys.exit(1)

              print(f"[OK] result.json → {len(r['top10'])}개 종목")
              print(f"[TOP1] {top.get('code')} / score {top.get('score')}")

              with open("data.json", encoding="utf-8") as f:
                  d = json.load(f)

              if len(d.get("all", [])) < 1:
                  print("[FAIL] data.json insufficient")
                  sys.exit(1)

              print(f"[OK] data.json → {len(d['all'])}개 종목")

          except Exception as e:
              print("[FAIL]", e)
              sys.exit(1)
          EOF

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add history.csv portfolio.json ic_history.json result.json || true

          git diff --staged --quiet && echo "no changes" && exit 0

          git commit -m "auto update $(date +'%Y-%m-%d %H:%M:%S')"
          git push

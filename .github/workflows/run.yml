name: Stock Engine

on:
  schedule:
    - cron: "57 22 * * 1-5"   # KST 07:57
    - cron: "57 11 * * 1-5"   # KST 20:57
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-engine
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. repo 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 환경 세팅
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      # 4. 엔진 실행 ✅ KRX 인증 추가
      - name: Run Stock Engine
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python engine/engine.py

      # 5. 결과 커밋 ✅ 대상 파일 명시
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add history.csv portfolio.json ic_history.json result.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto update $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

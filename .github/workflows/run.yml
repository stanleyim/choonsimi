name: choonsimi-daily

on:
  schedule:
    - cron: '2 11 * * 1-5'   # KST 20:02 (UTC 11:02)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Python 환경
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. 의존성 설치
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 데이터 수집
    - name: Fetch Data
      run: python fetch_data.py

    # 5. 엔진 실행 (경로 중요)
    - name: Run Engine
      run: python engine/engine.py

    # 6. 결과 검증 (깨짐 방지)
    - name: Validate Result
      run: |
        python - <<EOF
        import json
        d = json.load(open("result.json"))
        assert "top10" in d, "top10 missing"
        assert len(d["top10"]) == 10, "top10 length error"
        print("VALIDATION OK")
        EOF

    # 7. 결과 커밋 (히스토리 포함)
    - name: Commit Results
      run: |
        git config --global user.name "choonsimi-bot"
        git config --global user.email "bot@choonsimi.com"
        git add result.json history.csv data.json
        git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"
        git push

    # 8. (선택) 앱으로 전송
    - name: Publish to App
      if: env.APP_API_URL != ''
      env:
        APP_API_URL: ${{ secrets.APP_API_URL }}
      run: python publish.py

    # 9. 로그 출력 (디버깅용)
    - name: Debug Info
      run: |
        echo "Run completed at:"
        date

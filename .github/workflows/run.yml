name: Stock Engine

on:
  schedule:
    - cron: "57 22 * * 1-5"   # KST 07:57
    - cron: "57 11 * * 1-5"   # KST 20:57
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-engine
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt

      # ---------- corp_map 생성 ----------
      - name: Build corp map
        run: python build_corp_map.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      # ---------- 엔진 실행 ----------
      - name: Run Stock Engine
        run: python engine.py
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      # ---------- 데이터 검증 (핵심) ----------
      - name: Validate output
        run: |
          python - <<EOF
          import json, sys

          try:
              d = json.load(open("data.json"))

              if len(d.get("all", [])) < 50:
                  print("[FAIL] too few stocks")
                  sys.exit(1)

              top = d["all"][0]
              if top.get("score", 0) <= 0:
                  print("[FAIL] invalid score")
                  sys.exit(1)

              print(f"[OK] {len(d['all'])} stocks, Top1 score:{top['score']}, DART:{top.get('dart_score')}")
          except Exception as e:
              print("[FAIL]", e)
              sys.exit(1)
          EOF

      # ---------- 커밋 (루트 기준) ----------
      - name: Commit results
        working-directory: .
        run: |
          git config user.name "choonsimi-bot"
          git config user.email "bot@choonsimi.com"

          git add engine/data.json engine/corp_map.json engine/history.csv

          git diff --staged --quiet && echo "no changes, skip commit" && exit 0

          git commit -m "update: $(date '+%Y-%m-%d %H:%M')"

          git pull --rebase origin main
          git push origin main

name: choonsimi-daily

permissions:
  contents: write

on:
  schedule:
    - cron: '3 10 * * 1-5'   # KST 19:03 (UTC 10:03) 월~금
  workflow_dispatch:

concurrency:
  group: choonsimi-lock
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ───────────── HOLIDAY CHECK ─────────────
      - name: Check Holiday (KRX)
        id: holiday
        run: |
          python - << 'EOF'
import holidays
import datetime
import sys

today = datetime.date.today()
kr = holidays.KR(years=today.year)

if today in kr:
    sys.exit(1)
else:
    sys.exit(0)
EOF

      - name: Skip if Holiday
        if: failure() && steps.holiday.outcome == 'failure'
        run: |
          echo "KRX holiday - skip run"
          exit 0

      # ───────────── DATA LAYER ─────────────
      - name: Fetch Market Data (KIS → history.csv)
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python fetch_data.py

      - name: Fetch Market Flow
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python fetch_kis_flow.py

      - name: Fetch News (Naver)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_news.py

      # ───────────── ENGINE ─────────────
      - name: Run Engine
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python -m engine.engine

      # ───────────── VALIDATION ─────────────
      - name: Validate Output
        run: |
          test -s result.json || (echo "missing result.json" && exit 1)
          test -s history.csv || (echo "missing history.csv" && exit 1)
          test -s market_flow.json || (echo "missing market_flow.json" && exit 1)
          test -s news_scores.json || (echo "missing news_scores.json" && exit 1)
          echo "validation OK"

      # ───────────── COMMIT ─────────────
      - name: Commit Results
        run: |
          git config user.name "choonsimi-bot"
          git config user.email "bot@choonsimi.com"

          git add result.json history.csv signal_history.csv
          git add market_flow.json news_scores.json
          git add regime_cache.json fundamental.json api/_private/ 2>/dev/null || true

          git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"
          git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}

name: choonsimi-daily

permissions:
  contents: write

on:
  schedule:
    - cron: '2 11 * * 1-5'   # KST 20:02 (UTC 11:02)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install deps
      run: |
        pip install --upgrade pip
        pip install pandas==2.2.2 numpy==1.26.4 requests==2.31.0 lxml==5.2.1

    - name: Fetch Data
      run: python fetch_data.py

    - name: Run Engine
      run: python engine/engine.py

    - name: Validate Result
      run: python validator.py

    - name: Commit & Push
      run: |
        git config --global user.name "choonsimi-bot"
        git config --global user.email "bot@choonsimi.com"
        git add result.json history.csv data.json
        git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

    - name: Publish (optional)
      if: env.APP_API_URL != ''
      env:
        APP_API_URL: ${{ secrets.APP_API_URL }}
      run: python publish.py

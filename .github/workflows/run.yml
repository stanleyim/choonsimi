name: Stock Engine

on:
  schedule:
    - cron: "57 22 * * 1-5"   # KST 07:57
    - cron: "57 11 * * 1-5"   # KST 20:57
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-engine
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. repo 가져오기 (필수)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 환경 세팅 (cache 포함 → 속도 최적화)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 의존성 설치 (중요: engine 경로 지정)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      # 4. 엔진 실행
      - name: Run Stock Engine
        run: python engine/engine.py

      # 5. 결과 커밋 (data.json 업데이트용)
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update stock engine results"
            git push
          fi

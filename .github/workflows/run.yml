name: choonsimi-daily

permissions:
  contents: write

on:
  schedule:
    - cron: '3 10 * * 1-5'   # KST 19:03 (UTC 10:03) 월~금
  workflow_dispatch:

concurrency:
  group: choonsimi-lock
  cancel-in-progress: true   # ✅ hang 방지

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── HOLIDAY CHECK ──────────────────────────────
      # sys.exit(1) 방식 제거 → GITHUB_OUTPUT 방식으로 교체
      # 공휴일이어도 job 초록색 정상 표시
      - name: Check Holiday (KRX)
        id: holiday
        run: |
          python3 -c "
          import holidays, datetime, os
          today = datetime.date.today()
          kr = holidays.KR(years=today.year)
          skip = 'true' if today in kr else 'false'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'skip={skip}\n')
          print(f'[HOLIDAY] today={today} skip={skip}')
          "

      - name: Holiday Notice
        if: steps.holiday.outputs.skip == 'true'
        run: echo "📅 KRX 공휴일 — 데이터 수집 스킵 (정상)"

      # ── DATA LAYER ─────────────────────────────────
      - name: Fetch Market Data (KIS → history.csv)
        if: steps.holiday.outputs.skip != 'true'
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python fetch_data.py

      - name: Fetch Market Flow (KIS → market_flow.json)
        if: steps.holiday.outputs.skip != 'true'
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python fetch_kis_flow.py

      - name: Fetch News (Naver → news_scores.json)
        if: steps.holiday.outputs.skip != 'true'
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_news.py

      - name: Fetch Fundamentals (DART → fundamental.json)
        if: steps.holiday.outputs.skip != 'true'
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python fetch_dart.py

      # ── ENGINE ─────────────────────────────────────
      - name: Run Engine
        if: steps.holiday.outputs.skip != 'true'
        env:
          DART_API_KEY:   ${{ secrets.DART_API_KEY }}
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python -m engine.engine

      # ── VALIDATION ─────────────────────────────────
      - name: Validate Output
        if: steps.holiday.outputs.skip != 'true'
        run: |
          test -s result.json      || (echo "❌ result.json 없음"      && exit 1)
          test -s history.csv      || (echo "❌ history.csv 없음"      && exit 1)
          test -s market_flow.json || (echo "❌ market_flow.json 없음" && exit 1)
          test -s news_scores.json || (echo "❌ news_scores.json 없음" && exit 1)
          echo "✅ 검증 완료"

      # ── COMMIT ─────────────────────────────────────
      - name: Commit Results
        if: steps.holiday.outputs.skip != 'true'
        run: |
          git config user.name  "choonsimi-bot"
          git config user.email "bot@choonsimi.com"

          git add result.json
          git add history.csv
          git add signal_history.csv   2>/dev/null || true
          git add market_flow.json
          git add news_scores.json
          git add fundamental.json     2>/dev/null || true
          git add corp_map_cache.json  2>/dev/null || true
          git add failure_analysis.json 2>/dev/null || true
          git add failure_history.csv   2>/dev/null || true

          git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"
          git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}

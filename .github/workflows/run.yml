name: choonsimi-daily

permissions:
  contents: write

on:
  schedule:
    - cron: '2 11 * * 1-5'   # KST 20:02 (UTC 11:02)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # PYTHON SETUP
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # =========================
    # DEPENDENCIES
    # =========================
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # =========================
    # FETCH DATA
    # =========================
    - name: Fetch Data
      run: |
        python fetch_data.py

    # =========================
    # RUN ENGINE (FIXED)
    # =========================
    - name: Run Engine
      run: |
        python -m engine.engine

    # =========================
    # COMMIT RESULTS (SAFE)
    # =========================
    - name: Commit & Push
      run: |
        git config --global user.name "choonsimi-bot"
        git config --global user.email "bot@choonsimi.com"

        # 핵심 결과만 반영
        git add result.json api/_private/history.csv

        git commit -m "daily update $(date +'%Y-%m-%d')" || echo "no changes"

        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

name: KRX Quant Engine

on:
  schedule:
    # KST 16:10 (장 마감)
    - cron: '10 7 * * 1-5'
    # KST 22:00 (야간 리밸런싱)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────
      # 1. Checkout
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Python
      # ─────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────
      # 3. Dependencies (FIXED)
      # ─────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests pykrx finance-datareader

      # ─────────────────────────────
      # 4. Universe Build
      # ─────────────────────────────
      - name: Build Universe
        run: |
          python fetch_data.py

      # ─────────────────────────────
      # 5. Engine Run
      # ─────────────────────────────
      - name: Run Engine
        run: |
          python engine/engine.py

      # ─────────────────────────────
      # 6. STRICT VALIDATION (FAIL FAST)
      # ─────────────────────────────
      - name: Validate output
        run: |
          python - <<EOF
          import json, sys

          # ---------- result.json ----------
          try:
              with open("result.json") as f:
                  r = json.load(f)
          except:
              print("[FAIL] result.json missing")
              sys.exit(1)

          top10 = r.get("top10", [])
          if len(top10) == 0:
              print("[FAIL] top10 empty")
              sys.exit(1)

          print(f"[OK] result.json → {len(top10)} stocks")

          for s in top10[:5]:
              print(f"{s['code']} | score={s['score']} | weight={round(s['weight'],4)}")

          # ---------- data.json ----------
          try:
              with open("data.json") as f:
                  d = json.load(f)
          except:
              print("[FAIL] data.json missing")
              sys.exit(1)

          universe = d.get("all", [])
          if len(universe) < 50:
              print(f"[FAIL] universe too small: {len(universe)}")
              sys.exit(1)

          print(f"[OK] data.json → {len(universe)} stocks")

          # ---------- sanity check ----------
          if not all("code" in x for x in top10):
              print("[FAIL] invalid schema in result.json")
              sys.exit(1)

          changes = r.get("changes", {})
          print(f"[CHANGE] add={changes.get('add',[])} remove={changes.get('remove',[])}")
          EOF

      # ─────────────────────────────
      # 7. Commit Results
      # ─────────────────────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"

          git add result.json portfolio.json ic_history.json history.csv data.json data.json.bak

          git diff --cached --quiet && echo "no changes" && exit 0

          git commit -m "[auto] update $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST"
          git push
